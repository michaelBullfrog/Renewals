services:
  - type: cron
    name: subscription-renewal-notifier
    runtime: python
    plan: starter
    schedule: "0 13 * * *"
    buildCommand: "pip install -r requirements_render_renewal.txt"
    startCommand: "python render_renewal_notifier.py"
    envVars:
      - key: WEBEX_ACCESS_TOKEN
        sync: false
      - key: WEBEX_ROOM_ID
        sync: false
      - key: EXCEL_FILE
        value: subscriptions.xlsx
      - key: SHEET_NAME
        value: Subscription Details-Line Level
      - key: STATUS_FILTER
        value: ACTIVE
      - key: NOTIFY_DAYS
        value: "60"
      - key: PER_MESSAGE
        value: "15"
      - key: INCLUDE_HEADER
        value: "true"
      - key: ALLOW_DUPLICATES
        value: "false"
      - key: STATE_FILE
        value: /var/data/sent_notifications.json
